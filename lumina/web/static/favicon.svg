<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Camera body -->
  <rect x="3" y="9" width="26" height="18" rx="3" fill="#1e293b"/>
  <!-- Lens ring -->
  <circle cx="16" cy="18" r="7" fill="#334155"/>
  <!-- Lens -->
  <circle cx="16" cy="18" r="5" fill="#0ea5e9"/>
  <!-- Lens highlight -->
  <circle cx="14" cy="16" r="1.5" fill="#7dd3fc" opacity="0.6"/>
  <!-- Viewfinder bump -->
  <rect x="11" y="5" width="10" height="6" rx="2" fill="#1e293b"/>
  <!-- Flash -->
  <rect x="5" y="11" width="4" height="3" rx="1" fill="#f59e0b"/>
</svg>
